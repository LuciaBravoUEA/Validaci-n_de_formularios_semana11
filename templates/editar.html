<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h2>Editar Producto</h2>
    <form method="POST">
        <label>Nombre:</label>
        <input type="text" name="nombre" value="{{ producto[1] }}" required><br><br>

        <label>Precio:</label>
        <input type="number" step="0.01" name="precio" value="{{ producto[2] }}" required><br><br>

        <label>Cantidad:</label>
        <input type="number" step="0.01" name="cantidad" value="{{ producto[3] }}" required><br><br>

        <button type="submit" class="btn-accion">Actualizar</button>
    </form>
</body>
</html>
